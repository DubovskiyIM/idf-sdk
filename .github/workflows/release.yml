name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release PR or publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: pnpm run release
          title: "chore: release packages"
          commit: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # tsup DTS worker для @intent-driven/core (~31k LOC, ~1.3 MB bundle)
          # упирается в дефолтный heap (~4 GB) и падает с ERR_WORKER_OUT_OF_MEMORY.
          # ubuntu-latest даёт 7+ GB — поднимаем до 8 GB.
          NODE_OPTIONS: --max-old-space-size=8192
          # adapter-mantine DTS падает с TS2742 (cross-pnpm @types/react portability)
          # — блокирует публикацию всего monorepo. Сейчас публикуем без .d.ts во
          # всех пакетах (consumer'ы используют untyped JS, так же как CI bug).
          # Follow-up: добавить explicit type annotations в mantine-компоненты или
          # перевести на tsx + react.FC, тогда вернём dts по умолчанию.
          SKIP_DTS: "true"
